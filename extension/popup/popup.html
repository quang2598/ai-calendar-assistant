<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VietCalenAI</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- Auth Screen -->
  <div id="auth-screen" class="screen">
    <div class="auth-container">
      <div class="logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="10" fill="#22d3ee"/>
          <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" fill="#0f172a" font-size="18" font-weight="bold">V</text>
        </svg>
      </div>
      <h1 class="app-title">VietCalenAI</h1>
      <p class="app-subtitle">AI Calendar Assistant</p>
      <button id="btn-sign-in" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18" class="google-icon">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 2.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen" class="screen hidden">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <span class="header-title">VietCalenAI</span>
      </div>
      <div class="header-right">
        <button id="btn-side-panel" class="btn-icon" title="Open Side Panel">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="15" y1="3" x2="15" y2="21"/>
          </svg>
        </button>
        <button id="btn-sign-out" class="btn-icon" title="Sign Out">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Calendar Connect Banner -->
    <div id="calendar-banner" class="calendar-banner">
      <button id="btn-connect-calendar" class="btn-connect-calendar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Connect Google Calendar
      </button>
    </div>

    <!-- Speaking indicator -->
    <div id="speaking-indicator" class="speaking-indicator hidden">
      <span class="speaking-dot"></span>
      Speaking... Click to stop
    </div>

    <!-- Messages -->
    <div id="messages" class="messages"></div>

    <!-- Composer -->
    <div class="composer">
      <div class="composer-inner">
        <textarea id="composer-input" placeholder="Chat here..." rows="1"></textarea>
        <button id="btn-mic" class="btn-mic" title="Voice input">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <button id="btn-send" class="btn-send" title="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <!-- Voice listening overlay -->
      <div id="voice-overlay" class="voice-overlay hidden">
        <div class="voice-bars" id="voice-bars"></div>
        <button id="btn-stop-mic" class="btn-stop-mic">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="6" width="12" height="12" rx="2"/>
          </svg>
        </button>
        <span class="voice-label">Listening... Speak now</span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
