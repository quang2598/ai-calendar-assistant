<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VietCalenAI</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body class="w-[340px] h-[400px] bg-navy-900 text-white font-sans overflow-hidden rounded-2xl">
  <!-- Auth Screen -->
  <div id="auth-screen" class="flex flex-col items-center justify-center h-full px-6">
    <div class="w-12 h-12 rounded-xl gradient-accent flex items-center justify-center mb-3">
      <span class="text-lg font-bold text-navy-900">V</span>
    </div>
    <h1 class="text-lg font-bold gradient-accent-text mb-0.5">VietCalenAI</h1>
    <p class="text-xs text-white/50 mb-6">AI Calendar Assistant</p>
    <button id="btn-sign-in" class="btn-hover glass flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-medium">
      <svg width="16" height="16" viewBox="0 0 18 18">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 2.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen" class="hidden flex flex-col h-full">
    <!-- Header -->
    <div class="flex items-center justify-between px-3 py-2 border-b border-white/5">
      <span class="text-xs font-semibold gradient-accent-text">VietCalenAI</span>
      <div class="flex gap-0.5">
        <button id="btn-side-panel" class="btn-hover p-1.5 rounded-lg text-white/40 hover:text-white/80" title="Open Side Panel">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="15" y1="3" x2="15" y2="21"/>
          </svg>
        </button>
        <button id="btn-sign-out" class="btn-hover p-1.5 rounded-lg text-white/40 hover:text-white/80" title="Sign Out">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Calendar Connect Banner -->
    <div id="calendar-banner" class="px-3 py-1.5">
      <button id="btn-connect-calendar" class="btn-hover w-full flex items-center justify-center gap-2 px-3 py-2 rounded-xl glass text-xs font-medium text-cyan-400 border border-cyan-500/20">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span id="calendar-btn-text">Connect Google Calendar</span>
      </button>
    </div>

    <!-- Chat Area -->
    <div id="chat-area" class="flex-1 flex flex-col px-3 gap-2 overflow-y-auto scrollbar-thin pb-2 relative">
      <!-- Siri Orb (shown during voice — covers chat area) -->
      <div id="siri-orb" class="hidden absolute inset-0 flex flex-col items-center justify-center gap-3 z-10 bg-navy-900/90">
        <div class="w-24 h-24 rounded-full gradient-accent glow-cyan orb-listening"></div>
        <span id="orb-label" class="text-sm text-white/60">Listening...</span>
      </div>

      <!-- Messages (max 2: user on right, system on left) -->
      <div id="messages" class="w-full flex flex-col gap-2 mt-auto">
        <!-- User message (right-aligned) -->
        <div id="msg-user" class="hidden flex flex-col items-end">
          <div class="text-[10px] text-white/40 mb-0.5">You</div>
          <div class="glass rounded-2xl rounded-br-sm px-3 py-2 text-xs leading-relaxed max-w-[85%]" id="msg-user-text"></div>
        </div>
        <!-- System message (left-aligned) -->
        <div id="msg-system" class="hidden flex flex-col items-start">
          <div class="text-[10px] text-cyan-400/60 mb-0.5">Assistant</div>
          <div class="glass-strong rounded-2xl rounded-bl-sm px-3 py-2 text-xs leading-relaxed max-w-[85%] max-h-[180px] overflow-y-auto scrollbar-thin" id="msg-system-text"></div>
        </div>
        <!-- Thinking indicator (left-aligned) -->
        <div id="msg-thinking" class="hidden flex flex-col items-start">
          <div class="text-[10px] text-cyan-400/60 mb-0.5">Assistant</div>
          <div class="glass-strong rounded-2xl rounded-bl-sm px-3 py-2 text-xs">
            <span class="inline-flex gap-1">
              <span class="w-1 h-1 rounded-full bg-cyan-400 animate-bounce" style="animation-delay: 0ms"></span>
              <span class="w-1 h-1 rounded-full bg-cyan-400 animate-bounce" style="animation-delay: 150ms"></span>
              <span class="w-1 h-1 rounded-full bg-cyan-400 animate-bounce" style="animation-delay: 300ms"></span>
            </span>
          </div>
        </div>
      </div>
    </div>

    <!-- Composer -->
    <div class="px-3 py-2 border-t border-white/5">
      <div class="flex items-end gap-1.5 glass rounded-xl px-2.5 py-1.5">
        <textarea id="composer-input" placeholder="Chat here..." rows="1"
          class="flex-1 bg-transparent text-xs text-white placeholder-white/30 resize-none outline-none max-h-[60px]"></textarea>
        <button id="btn-mic" class="btn-hover p-1.5 rounded-lg text-white/60 hover:text-cyan-400 transition-colors" title="Voice input">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <button id="btn-send" class="btn-hover p-1.5 rounded-lg text-white/60 hover:text-cyan-400 transition-colors" title="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
