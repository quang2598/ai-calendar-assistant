<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VietCalenAI - Side Panel</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body class="min-h-screen bg-navy-900 text-white font-sans">
  <!-- Not Signed In Placeholder -->
  <div id="auth-placeholder" class="flex flex-col items-center justify-center h-screen px-8 text-center">
    <div class="w-12 h-12 rounded-xl gradient-accent flex items-center justify-center mb-4 opacity-50">
      <span class="text-lg font-bold text-navy-900">V</span>
    </div>
    <p class="text-white/40 text-sm">Please sign in via the<br/>pop-up extension to get started</p>
  </div>

  <!-- Main Screen -->
  <div id="main-screen" class="hidden flex flex-col h-screen">
    <!-- Tab Bar -->
    <div class="flex items-center px-3 py-2 glass border-b border-white/5">
      <button class="tab active flex items-center gap-1.5 px-4 py-2 rounded-lg text-xs font-medium transition-all" data-tab="events">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Events
      </button>
      <button class="tab flex items-center gap-1.5 px-4 py-2 rounded-lg text-xs font-medium transition-all" data-tab="history">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        History
      </button>
      <div class="flex-1"></div>
      <button id="btn-close-panel" class="btn-hover p-1.5 rounded-lg text-white/40 hover:text-white/80" title="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-0 left-0 right-0 z-50 px-3 pt-14 pointer-events-none"></div>

    <!-- Tab Content -->
    <div class="flex-1 overflow-hidden">
      <!-- Events Tab -->
      <div id="tab-events" class="tab-content active h-full overflow-y-auto scrollbar-thin px-3 py-3">
        <!-- Calendar -->
        <div class="glass rounded-2xl p-4 mb-3">
          <div class="flex items-center justify-between mb-3">
            <button id="btn-prev-month" class="btn-hover p-1 rounded-lg text-white/50 hover:text-white">&lt;</button>
            <span id="calendar-month-label" class="text-sm font-medium"></span>
            <button id="btn-next-month" class="btn-hover p-1 rounded-lg text-white/50 hover:text-white">&gt;</button>
          </div>
          <div class="grid grid-cols-7 text-center text-[10px] text-white/30 mb-2">
            <span>Su</span><span>Mo</span><span>Tu</span><span>We</span>
            <span>Th</span><span>Fr</span><span>Sa</span>
          </div>
          <div id="calendar-days" class="grid grid-cols-7 gap-0.5 text-center"></div>
        </div>

        <!-- Events List -->
        <div class="glass rounded-2xl p-4">
          <h3 id="events-date-label" class="text-sm font-medium mb-3">Today's Events</h3>
          <div id="events-list">
            <div class="text-xs text-white/30 text-center py-4">No events for this day</div>
          </div>
        </div>
      </div>

      <!-- History Tab -->
      <div id="tab-history" class="tab-content hidden h-full overflow-y-auto scrollbar-thin px-3 py-3">
        <div class="glass rounded-2xl p-4">
          <h3 class="text-sm font-medium mb-3">Action History</h3>
          <div id="history-list">
            <div class="text-xs text-white/30 text-center py-4">No actions yet</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="sidepanel.js"></script>
</body>
</html>
