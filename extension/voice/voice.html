<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VietCalenAI - Voice Input</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      width: 100%;
      min-height: 100vh;
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      overflow: hidden;
    }
    .title {
      font-size: 14px;
      color: #94a3b8;
    }
    .voice-bars {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 40px;
    }
    .voice-bar {
      width: 3px;
      background: #22d3ee;
      border-radius: 2px;
      transition: height 0.1s ease;
      height: 4px;
    }
    .transcript {
      font-size: 13px;
      color: #e2e8f0;
      text-align: center;
      padding: 0 20px;
      min-height: 40px;
      max-height: 60px;
      overflow-y: auto;
      word-wrap: break-word;
    }
    .btn-stop {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: #dc2626;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse-ring 1.5s ease-in-out infinite;
    }
    .btn-stop:hover { background: #b91c1c; }
    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
      50% { box-shadow: 0 0 0 12px rgba(220, 38, 38, 0); }
    }
    .hint {
      font-size: 11px;
      color: #64748b;
    }
    .error {
      font-size: 12px;
      color: #f87171;
      text-align: center;
      padding: 0 20px;
    }
  </style>
</head>
<body>
  <div class="title">Listening... Speak now</div>
  <div class="voice-bars" id="voice-bars"></div>
  <div class="transcript" id="transcript"></div>
  <button class="btn-stop" id="btn-stop">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
      <rect x="6" y="6" width="12" height="12" rx="2"/>
    </svg>
  </button>
  <div class="hint">Stops automatically after 1.2s of silence</div>
  <div class="error" id="error"></div>

  <script src="voice.js"></script>
</body>
</html>
